networks:
  sharp-blaze-network:
    name: sharp-blaze-network
    driver: bridge

services:
  broker:
    build:
      context: ./src/broker
      dockerfile: Dockerfile
    environment:
      BROKER_HOST: 0.0.0.0
      BROKER_PORT: 6000
      BROKER_GAME_IMAGE: sharp-blaze-server:latest
      BROKER_GAME_TCP_PORT: 5555
      BROKER_GAME_UDP_PORT: 5556
      BROKER_GAME_HOST_IP: localhost #agregar ip de la maquina que esta hosteando, sino no sirve
      BROKER_GAME_NETWORK: sharp-blaze-network
    ports:
      - "6000:6000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - sharp-blaze-network

  game-server-image:
    build:
      context: ./src/server
      dockerfile: Dockerfile
    image: sharp-blaze-server:latest
    networks:
      - sharp-blaze-network
    profiles:
      - build-only
