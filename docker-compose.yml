services:
  broker:
    build:
      context: ./src/broker
      dockerfile: Dockerfile
    environment:
      # El broker escucha en todas las interfaces internas
      BROKER_HOST: 0.0.0.0
      BROKER_PORT: 6000
      
      # Imagen del servidor de juego a ejecutar
      BROKER_GAME_IMAGE: sharp-blaze-server:latest
      BROKER_GAME_TCP_PORT: 5555
      BROKER_GAME_UDP_PORT: 5556
      
      # ⚠️ IMPORTANTE: Cambiar esto a la IP Tailscale de esta máquina
      # Ejemplo: 100.64.x.x (IP asignada por Tailscale)
      # Esta es la dirección que el broker le retorna a los clientes
      BROKER_GAME_HOST_IP: ${SERVER_IP:-127.0.0.1}
      
      # Red Docker para comunicación interna servidor-broker
      BROKER_GAME_NETWORK: sharp-blaze-network
    ports:
      # Exponer broker en puerto 6000 (Tailscale lo hace accesible)
      - "6000:6000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - sharp-blaze-network

  game-server-image:
    build:
      context: ./src/server
      dockerfile: Dockerfile
    image: sharp-blaze-server:latest
    profiles:
      - build-only

networks:
  sharp-blaze-network:
    driver: bridge
